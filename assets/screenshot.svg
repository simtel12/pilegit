<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460">
  <style>
    .bg { fill: #1e1e2e; }
    .frame { fill: #313244; rx: 10; ry: 10; }
    .dot-r { fill: #f38ba8; }
    .dot-y { fill: #f9e2af; }
    .dot-g { fill: #a6e3a1; }
    .title { fill: #cdd6f4; font-family: ui-monospace, 'SF Mono', 'Cascadia Code', monospace; font-size: 13px; }
    .t { fill: #cdd6f4; font-family: ui-monospace, 'SF Mono', 'Cascadia Code', monospace; font-size: 13px; }
    .dim { fill: #6c7086; }
    .cyan { fill: #89dceb; }
    .cyanb { fill: #89dceb; font-weight: bold; }
    .green { fill: #a6e3a1; }
    .greenb { fill: #a6e3a1; font-weight: bold; }
    .yellow { fill: #f9e2af; }
    .yellowb { fill: #f9e2af; font-weight: bold; }
    .blue { fill: #89b4fa; }
    .blueu { fill: #89b4fa; text-decoration: underline; }
    .red { fill: #f38ba8; }
    .mauve { fill: #cba6f7; }
    .sel { fill: #45475a; }
    .notif { fill: #f9e2af; }
    .bar { fill: #181825; }
  </style>

  <!-- Window frame -->
  <rect class="frame" x="0" y="0" width="820" height="460"/>
  <rect class="bg" x="0" y="32" width="820" height="428" rx="0" ry="0"/>
  <!-- Rounded bottom corners -->
  <rect class="bg" x="0" y="440" width="820" height="10"/>
  <rect class="frame" x="0" y="448" width="820" height="12" rx="0" ry="0"/>
  <rect class="bg" x="2" y="440" width="816" height="18" rx="8" ry="8"/>

  <!-- Title bar -->
  <circle class="dot-r" cx="20" cy="16" r="6"/>
  <circle class="dot-y" cx="40" cy="16" r="6"/>
  <circle class="dot-g" cx="60" cy="16" r="6"/>
  <text class="title" x="350" y="20" text-anchor="middle">pgit — my-feature</text>

  <!-- Header -->
  <text class="dim" x="20" y="58" font-family="monospace" font-size="13">pilegit — my-feature (5 commits on origin/main)</text>

  <!-- Commit list -->
  <!-- Commit 5 (top, newest) -->
  <text class="t" x="30" y="90" font-family="monospace" font-size="13">
    <tspan class="dim">  ○</tspan>
    <tspan class="yellow"> e5f6a7b</tspan>
    <tspan class="t"> feat: add dashboard page</tspan>
  </text>

  <!-- Commit 4 -->
  <text class="t" x="30" y="112" font-family="monospace" font-size="13">
    <tspan class="dim">  ○</tspan>
    <tspan class="yellow"> d4e5f6a</tspan>
    <tspan class="t"> feat: user profile endpoint</tspan>
  </text>

  <!-- Commit 3 (cursor, expanded, submitted) -->
  <rect class="sel" x="10" y="122" width="800" height="110" rx="3"/>
  <text x="30" y="140" font-family="monospace" font-size="13">
    <tspan class="greenb">  →</tspan>
    <tspan class="yellow"> c3d4e5f</tspan>
    <tspan class="t"> feat: auth middleware</tspan>
    <tspan class="cyanb">  ◈ PR#14</tspan>
  </text>
  <!-- Expanded details -->
  <text class="dim" x="78" y="162" font-family="monospace" font-size="13" font-style="italic">hokwang • 2026-04-05 10:32:15 -0400</text>
  <text class="cyan" x="78" y="182" font-family="monospace" font-size="12" opacity="0.7">branch: pgit/hokwang/feat-auth-middleware</text>
  <text class="blueu" x="78" y="202" font-family="monospace" font-size="12">https://github.com/user/repo/pull/14</text>
  <text class="dim" x="78" y="222" font-family="monospace" font-size="12">Add JWT-based auth middleware for API routes</text>

  <!-- Commit 2 (submitted) -->
  <text x="30" y="252" font-family="monospace" font-size="13">
    <tspan class="dim">  ○</tspan>
    <tspan class="yellow"> b2c3d4e</tspan>
    <tspan class="t"> feat: database migrations</tspan>
    <tspan class="cyanb">  ◈ PR#12</tspan>
  </text>

  <!-- Commit 1 (bottom, submitted) -->
  <text x="30" y="274" font-family="monospace" font-size="13">
    <tspan class="dim">  ○</tspan>
    <tspan class="yellow"> a1b2c3d</tspan>
    <tspan class="t"> feat: initial project setup</tspan>
    <tspan class="cyanb">  ◈ PR#11</tspan>
  </text>

  <!-- Notification bar -->
  <text x="20" y="380" font-family="monospace" font-size="13">
    <tspan class="yellowb"> ▸ </tspan>
    <tspan class="yellow">Rebase completed. Stack: 5 commits.</tspan>
  </text>

  <!-- Shortcut bar background -->
  <rect class="bar" x="0" y="392" width="820" height="22"/>

  <!-- Shortcut bar -->
  <text x="14" y="408" font-family="monospace" font-size="11.5">
    <tspan class="cyanb">↑k/↓j</tspan><tspan class="dim">:move  </tspan>
    <tspan class="cyanb">V</tspan><tspan class="dim">:select  </tspan>
    <tspan class="cyanb">Ctrl+↑↓</tspan><tspan class="dim">:reorder  </tspan>
    <tspan class="cyanb">e</tspan><tspan class="dim">:edit  </tspan>
    <tspan class="cyanb">i</tspan><tspan class="dim">:insert  </tspan>
    <tspan class="cyanb">x</tspan><tspan class="dim">:remove  </tspan>
    <tspan class="cyanb">d</tspan><tspan class="dim">:diff  </tspan>
    <tspan class="cyanb">r</tspan><tspan class="dim">:rebase  </tspan>
    <tspan class="cyanb">p</tspan><tspan class="dim">:submit  </tspan>
    <tspan class="cyanb">s</tspan><tspan class="dim">:sync  </tspan>
    <tspan class="cyanb">?</tspan><tspan class="dim">:help</tspan>
  </text>
  <text x="14" y="426" font-family="monospace" font-size="11.5">
    <tspan class="cyanb">u</tspan><tspan class="dim">:undo  </tspan>
    <tspan class="cyanb">Ctrl+r</tspan><tspan class="dim">:redo  </tspan>
    <tspan class="cyanb">h</tspan><tspan class="dim">:history  </tspan>
    <tspan class="cyanb">q</tspan><tspan class="dim">:quit</tspan>
  </text>
</svg>
